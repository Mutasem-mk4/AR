
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SavoryAR Platform</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- A-Frame and MindAR -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; font-family: 'Inter', sans-serif; }
      #root { height: 100vh; width: 100vw; }
      /* MindAR often attaches to the body, so we need to ensure our UI stays on top */
      .ui-layer { z-index: 9999; position: relative; pointer-events: auto; }
      /* Fix for A-Frame taking over background */
      .a-canvas { z-index: 0 !important; }
    </style>

  }
}

</head>
